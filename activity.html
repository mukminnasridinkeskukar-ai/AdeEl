<body class="app-layout"><div class="sidebar" id="sidebar"><div class="sidebar-header"><div class="sidebar-logo"><i class="fas fa-clipboard-list"></i></div><span class="sidebar-brand">ADeEl</span></div><div class="sidebar-menu"><div class="sidebar-group"><div class="sidebar-group-title">Menu</div><a href="dashboard.html" class="sidebar-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a><a href="activity.html" class="sidebar-item active"><i class="fas fa-tasks"></i><span>Aktivitas Harian</span></a><a href="employee.html" class="sidebar-item"><i class="fas fa-users"></i><span>Data Pegawai</span></a><a href="report.html" class="sidebar-item"><i class="fas fa-chart-bar"></i><span>Laporan</span></a><a href="setting.html" class="sidebar-item"><i class="fas fa-cog"></i><span>Pengaturan</span></a></div></div><div class="sidebar-footer"><div class="sidebar-user" onclick="window.location.href=&#39;setting.html&#39;"><div class="sidebar-avatar" id="sidebarAvatar">A</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarName">Administrator</div><div class="sidebar-user-role" id="sidebarRole">Admin</div></div></div></div></div><div class="sidebar-overlay" id="sidebarOverlay"></div><div class="main-content"><nav class="top-navbar"><div class="navbar-left"><button class="navbar-menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button><h5 class="navbar-page-title">Aktivitas Harian</h5></div><div class="navbar-search"><i class="fas fa-search"></i><input type="text" placeholder="Cari..."></div><div class="navbar-right"><button class="navbar-btn" id="themeToggle"><i class="fas fa-moon"></i></button><button class="navbar-btn" onclick="window.location.href=&#39;setting.html&#39;"><i class="fas fa-cog"></i></button><button class="navbar-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button></div></nav>
<div class="page-content"><div class="d-flex justify-content-between align-items-center mb-4"><h4 class="m-0 fw-bold"><i class="fas fa-tasks me-2 text-primary"></i>Aktivitas Harian</h4><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalActivity"><i class="fas fa-plus"></i>Tambah Aktivitas</button></div><div class="card"><div class="card-body"><div class="table-container"><table class="table" id="tableActivity"><thead><tr><th>Tanggal</th><th>Kategori</th><th>Kegiatan</th><th>Deskripsi</th><th>Jam</th><th>Durasi</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="activityTableBody"></tbody></table></div></div></div></div>
<!-- Modal Activity --><div class="modal fade" id="modalActivity" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title"><i class="fas fa-edit me-2 text-primary"></i><span id="modalActivityTitle">Tambah Aktivitas</span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="formActivity"><input type="hidden" id="activityId"><div class="row g-3"><div class="col-md-6"><label class="form-label">Tanggal</label><input type="date" class="form-control" id="actTanggal" required></div><div class="col-md-3"><label class="form-label">Jam Mulai</label><input type="time" class="form-control" id="actMulai" required></div><div class="col-md-3"><label class="form-label">Jam Selesai</label><input type="time" class="form-control" id="actSelesai" required></div><div class="col-md-6"><label class="form-label">Kategori</label><select class="form-select" id="actKategori"><option value="">Pilih Kategori</option><option>Pelayanan</option><option>Administrasi</option><option>Rapat</option><option>Lapangan</option><option>Lainnya</option></select></div><div class="col-md-6"><label class="form-label">Sub Kegiatan</label><input type="text" class="form-control" id="actSubKegiatan" placeholder="Sub kegiatan"></div><div class="col-12"><label class="form-label">Deskripsi Pekerjaan</label><textarea class="form-control" id="actDeskripsi" rows="3" placeholder="Deskripsikan pekerjaan yang dilakukan"></textarea></div><div class="col-md-4"><label class="form-label">Lokasi</label><input type="text" class="form-control" id="actLokasi" placeholder="Lokasi kerja"></div><div class="col-md-2"><label class="form-label">Volume</label><input type="number" class="form-control" id="actVolume" value="1"></div><div class="col-md-3"><label class="form-label">Satuan</label><input type="text" class="form-control" id="actSatuan" placeholder="Kegiatan"></div><div class="col-md-3"><label class="form-label">Status</label><select class="form-select" id="actStatus"><option value="Draft">Draft</option><option value="Submitted">Submitted</option></select></div></div></form></div><div class="modal-footer"><button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Batal</button><button type="button" class="btn btn-primary" id="simpanActivity"><i class="fas fa-save"></i>Simpan</button></div></div></div></div><div class="toast-container" id="toastContainer"></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="js/config.js"></script><script src="js/app.js"></script><script src="js/activity.js"></script></body></html>
