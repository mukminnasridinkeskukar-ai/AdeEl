<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ADeEl - Login</title><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="css/style.css"></head><body class="login-page">
<div class="login-container"><div class="login-card"><div class="login-header"><div class="login-logo"><i class="fas fa-clipboard-list"></i></div><h2 class="login-title">ADeEl</h2><p class="login-subtitle">Advanced Digital Employee Log</p></div><form id="loginForm"><div class="form-floating mb-3"><input type="text" class="form-control" id="nip" placeholder="NIP atau Username" required autocomplete="username"><label for="nip"><i class="fas fa-user me-2"></i>NIP atau Username</label></div><div class="form-floating mb-4"><input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password"><label for="password"><i class="fas fa-lock me-2"></i>Password</label><span class="password-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;z-index:5"><i class="fas fa-eye"></i></span></div><button type="submit" class="btn btn-primary w-100 py-3"><i class="fas fa-sign-in-alt"></i> Masuk</button></form><div class="text-center mt-3"><small class="text-muted">Demo: admin/123456, pimpinan/123456, pegawai/123456</small></div></div></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="js/config.js"></script><script src="js/app.js"></script><script src="js/login.js"></script></body></html>
